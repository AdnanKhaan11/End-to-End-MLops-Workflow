<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Wine Quality Prediction</title>
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='style.css') }}"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700;800&family=Lato:wght@300;400;500&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="background-animation">
      <div class="gradient-blob blob-1"></div>
      <div class="gradient-blob blob-2"></div>
      <div class="gradient-blob blob-3"></div>
    </div>

    <div class="container">
      <div class="form-wrapper">
        <!-- Header Section -->
        <div class="form-header">
          <div class="header-icon">🍷</div>
          <h1 class="main-title">Wine Quality Prediction</h1>
          <p class="subtitle">
            Analyze your wine's characteristics to predict quality
          </p>
        </div>

        <!-- Form -->
        <form class="wine-form" action="/predict" method="post">
          <!-- Section 1: Acidity Measures -->
          <div class="form-section">
            <h3 class="section-title">Acidity Measures</h3>
            <div class="form-row">
              <div class="form-group">
                <label for="fixed_acidity">Fixed Acidity</label>
                <div class="input-wrapper">
                  <input
                    type="text"
                    name="fixed_acidity"
                    id="fixed_acidity"
                    placeholder="e.g., 7.4"
                    required
                  />
                  <span class="input-hint">g/dm³</span>
                </div>
              </div>
              <div class="form-group">
                <label for="volatile_acidity">Volatile Acidity</label>
                <div class="input-wrapper">
                  <input
                    type="text"
                    name="volatile_acidity"
                    id="volatile_acidity"
                    placeholder="e.g., 0.7"
                    required
                  />
                  <span class="input-hint">g/dm³</span>
                </div>
              </div>
            </div>

            <div class="form-row">
              <div class="form-group">
                <label for="citric_acid">Citric Acid</label>
                <div class="input-wrapper">
                  <input
                    type="text"
                    name="citric_acid"
                    id="citric_acid"
                    placeholder="e.g., 0.0"
                    required
                  />
                  <span class="input-hint">g/dm³</span>
                </div>
              </div>
            </div>
          </div>

          <!-- Section 2: Sugar & Salts -->
          <div class="form-section">
            <h3 class="section-title">Sugar & Salts</h3>
            <div class="form-row">
              <div class="form-group">
                <label for="residual_sugar">Residual Sugar</label>
                <div class="input-wrapper">
                  <input
                    type="text"
                    name="residual_sugar"
                    id="residual_sugar"
                    placeholder="e.g., 1.9"
                    required
                  />
                  <span class="input-hint">g/dm³</span>
                </div>
              </div>
              <div class="form-group">
                <label for="chlorides">Chlorides</label>
                <div class="input-wrapper">
                  <input
                    type="text"
                    name="chlorides"
                    id="chlorides"
                    placeholder="e.g., 0.076"
                    required
                  />
                  <span class="input-hint">g/dm³</span>
                </div>
              </div>
            </div>
          </div>

          <!-- Section 3: Sulfur Dioxide -->
          <div class="form-section">
            <h3 class="section-title">Sulfur Dioxide Levels</h3>
            <div class="form-row">
              <div class="form-group">
                <label for="free_sulfur_dioxide">Free Sulfur Dioxide</label>
                <div class="input-wrapper">
                  <input
                    type="text"
                    name="free_sulfur_dioxide"
                    id="free_sulfur_dioxide"
                    placeholder="e.g., 11"
                    required
                  />
                  <span class="input-hint">mg/dm³</span>
                </div>
              </div>
              <div class="form-group">
                <label for="total_sulfur_dioxide">Total Sulfur Dioxide</label>
                <div class="input-wrapper">
                  <input
                    type="text"
                    name="total_sulfur_dioxide"
                    id="total_sulfur_dioxide"
                    placeholder="e.g., 34"
                    required
                  />
                  <span class="input-hint">mg/dm³</span>
                </div>
              </div>
            </div>
          </div>

          <!-- Section 4: Physical Properties -->
          <div class="form-section">
            <h3 class="section-title">Physical Properties</h3>
            <div class="form-row">
              <div class="form-group">
                <label for="density">Density</label>
                <div class="input-wrapper">
                  <input
                    type="text"
                    name="density"
                    id="density"
                    placeholder="e.g., 0.9956"
                    required
                  />
                  <span class="input-hint">g/cm³</span>
                </div>
              </div>
              <div class="form-group">
                <label for="pH">pH Level</label>
                <div class="input-wrapper">
                  <input
                    type="text"
                    name="pH"
                    id="pH"
                    placeholder="e.g., 3.51"
                    required
                  />
                  <span class="input-hint">scale</span>
                </div>
              </div>
            </div>
          </div>

          <!-- Section 5: Chemical Content -->
          <div class="form-section">
            <h3 class="section-title">Chemical Content</h3>
            <div class="form-row">
              <div class="form-group">
                <label for="sulphates">Sulphates</label>
                <div class="input-wrapper">
                  <input
                    type="text"
                    name="sulphates"
                    id="sulphates"
                    placeholder="e.g., 0.56"
                    required
                  />
                  <span class="input-hint">g/dm³</span>
                </div>
              </div>
              <div class="form-group">
                <label for="alcohol">Alcohol Content</label>
                <div class="input-wrapper">
                  <input
                    type="text"
                    name="alcohol"
                    id="alcohol"
                    placeholder="e.g., 9.4"
                    required
                  />
                  <span class="input-hint">%</span>
                </div>
              </div>
            </div>
          </div>

          <!-- Submit Button -->
          <!-- Navigation & Submit Buttons -->
          <div class="form-footer">
            <div class="button-group">
              <button type="submit" class="submit-btn" name="register">
                <span class="btn-text">Predict Quality</span>
                <span class="btn-icon">→</span>
              </button>
              <a href="/train" class="train-btn">
                <span class="btn-text">🔄 Train Model</span>
                <span class="btn-icon">⚙️</span>
              </a>
            </div>
          </div>
        </form>
      </div>
    </div>

    <!-- Loading Animation (optional, for Flask integration) -->
    <script>
      const form = document.querySelector(".wine-form");
      form.addEventListener("submit", function () {
        document.body.classList.add("form-submitting");
      });
    </script>
  </body>
</html>
